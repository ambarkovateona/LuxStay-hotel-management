<!DOCTYPE html>
<html lang="mk" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>LuxStay Hotel</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            padding: 24px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .nav-brand {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            color: var(--gold);
            letter-spacing: 3px;
            text-decoration: none;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        .btn-nav {
            border: 1px solid var(--gold);
            color: var(--gold) !important;
            padding: 10px 24px;
            letter-spacing: 2px;
            transition: all 0.3s !important;
        }

        .btn-nav:hover {
            background: var(--gold) !important;
            color: var(--bg) !important;
        }

        /* Hero */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            background: linear-gradient(rgba(20,20,20,0.7), rgba(20,20,20,0.9)),
            url('https://images.unsplash.com/photo-1566073771259-6a8506099945?w=1920') center/cover;
        }

        .hero h1 {
            font-size: 80px;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 20px;
            color: var(--text);
        }

        .hero h1 span {
            color: var(--gold);
        }

        .hero p {
            font-size: 16px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 50px;
        }

        .btn-primary {
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 16px 48px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            font-size: 13px;
            transition: all 0.3s;
            display: inline-block;
        }

        .btn-primary:hover {
            background: var(--gold);
            color: var(--bg);
        }

        /* Rooms Section */
        .section {
            padding: 100px 60px;
        }

        .section-title {
            font-size: 48px;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 10px;
        }

        .section-line {
            width: 60px;
            height: 1px;
            background: var(--gold);
            margin: 0 auto 60px;
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .room-card {
            background: var(--card);
            border: 1px solid var(--border);
            transition: border-color 0.3s, transform 0.3s;
        }

        .room-card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
        }

        .room-card-img {
            height: 220px;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .room-card-img i {
            font-size: 60px;
            color: var(--border);
        }

        .room-card-body {
            padding: 30px;
        }

        .room-type {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .room-desc {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .room-info {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .room-info span {
            color: var(--muted);
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .amenities {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }

        .amenity-tag {
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 4px 12px;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .room-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .room-price {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            color: var(--gold);
        }

        .room-price span {
            font-size: 14px;
            color: var(--muted);
            font-family: 'Jost', sans-serif;
        }

        .btn-reserve {
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 10px 24px;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s;
        }

        .btn-reserve:hover {
            background: var(--gold);
            color: var(--bg);
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--border);
            text-align: center;
            padding: 40px;
            color: var(--muted);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav>
    <a href="/" class="nav-brand">LuxStay</a>
    <div class="nav-links">
        <a href="/rooms">Соби</a>
        <div sec:authorize="isAuthenticated()">
            <a href="/dashboard">Мои резервации</a>
        </div>
        <div sec:authorize="hasRole('ADMIN')">
            <a href="/admin">Admin</a>
            <a href="/admin/guests">Гости</a>
            <a href="/admin/reports">Извештаи</a>
        </div>
        <div sec:authorize="!isAuthenticated()">
            <a href="/login" class="btn-nav">Логирај се</a>
        </div>
        <div sec:authorize="isAuthenticated()">
            <span style="color: var(--muted); font-size:13px; letter-spacing:1px;">
                <span sec:authentication="name"></span>
            </span>
            <a href="/logout" class="btn-nav" style="margin-left:20px;">Одјави се</a>
        </div>
    </div>
</nav>

<!-- Hero -->
<div class="hero">
    <div>
        <h1>Lux<span>Stay</span></h1>
        <p>Луксуз во секој детал</p>
        <a href="/rooms" class="btn-primary">Резервирај соба</a>
    </div>
</div>

<!-- Rooms -->
<div class="section">
    <h2 class="section-title">Наши соби</h2>
    <div class="section-line"></div>

    <div class="rooms-grid">
        <div th:each="room : ${rooms}" class="room-card">
            <div class="room-card-img">
                <i class="fas fa-bed"></i>
            </div>
            <div class="room-card-body">
                <h3 class="room-type" th:text="${room.roomType.typeName}"></h3>
                <p class="room-desc" th:text="${room.roomType.description}"></p>

                <div class="room-info">
                    <span>
                        <i class="fas fa-users"></i>
                        До <span th:text="${room.roomType.capacity}"></span> лица
                    </span>
                    <span>
                        <i class="fas fa-layer-group"></i>
                        Кат <span th:text="${room.floor}"></span>
                    </span>
                </div>

                <div class="amenities">
                    <span th:each="amenity : ${room.roomType.amenities}"
                          class="amenity-tag"
                          th:text="${amenity.amenityName}">
                    </span>
                </div>

                <div class="room-footer">
                    <div class="room-price">
                        <span th:text="${room.roomType.basePrice}"></span>€
                        <span>/ ноќ</span>
                    </div>
                    <a th:href="@{/rooms/{id}/reserve(id=${room.roomId})}"
                       class="btn-reserve">Резервирај</a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer>
    <p>© 2024 LuxStay Hotel — Сите права задржани</p>
</footer>

</body>
</html>
