<!DOCTYPE html>
<html lang="mk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LuxStay — Регистрација</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(rgba(20,20,20,0.85), rgba(20,20,20,0.95)),
            url('https://images.unsplash.com/photo-1618773928121-c32242e63f39?w=1920') center/cover;
        }

        .auth-box {
            width: 520px;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 50px;
        }

        .auth-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            color: var(--gold);
            letter-spacing: 4px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            text-align: center;
            color: var(--muted);
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        .form-label {
            display: block;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 14px 16px;
            font-family: 'Jost', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            border-color: var(--gold);
        }

        .btn-submit {
            width: 100%;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 16px;
            font-family: 'Jost', sans-serif;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--gold);
            color: var(--bg);
        }

        .auth-link {
            text-align: center;
            margin-top: 24px;
            color: var(--muted);
            font-size: 12px;
            letter-spacing: 1px;
        }

        .auth-link a {
            color: var(--gold);
            text-decoration: none;
        }

        .error-msg {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #ef4444;
            padding: 12px 16px;
            font-size: 13px;
            margin-bottom: 24px;
            text-align: center;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-box">
        <div class="auth-logo">LuxStay</div>
        <div class="auth-subtitle">Креирај профил</div>

        <form th:action="@{/register}" method="post"
              th:object="${registerDto}">

            <div class="form-grid">

                <!-- Error -->
                <div th:if="${error}" class="error-msg" th:text="${error}"></div>

                <div class="form-group">
                    <label class="form-label">Корисничко име</label>
                    <input type="text" th:field="*{username}"
                           class="form-input"
                           placeholder="Корисничко име" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Лозинка</label>
                    <input type="password" th:field="*{password}"
                           class="form-input"
                           placeholder="Лозинка" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Име</label>
                    <input type="text" th:field="*{firstName}"
                           class="form-input"
                           placeholder="Вашето ime" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Презиме</label>
                    <input type="text" th:field="*{lastName}"
                           class="form-input"
                           placeholder="Вашето презиме" required>
                </div>

                <div class="form-group full">
                    <label class="form-label">Е-маил</label>
                    <input type="email" th:field="*{email}"
                           class="form-input"
                           placeholder="Вашиот е-маил" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Националност</label>
                    <input type="text" th:field="*{nationality}"
                           class="form-input"
                           placeholder="Националност">
                </div>

                <div class="form-group">
                    <label class="form-label">Датум на раѓање</label>
                    <input type="date" th:field="*{dateOfBirth}"
                           class="form-input">
                </div>

                <div class="form-group full">
                    <button type="submit" class="btn-submit">
                        Регистрирај се
                    </button>
                </div>

            </div>
        </form>

        <div class="auth-link">
            Веќе имате профил?
            <a href="/login">Логирајте се</a>
        </div>
    </div>
</div>

</body>
</html>
