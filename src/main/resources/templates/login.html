<!DOCTYPE html>
<html lang="mk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LuxStay — Логирање</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(20,20,20,0.85), rgba(20,20,20,0.95)),
            url('https://images.unsplash.com/photo-1618773928121-c32242e63f39?w=1920') center/cover;
        }

        .auth-box {
            width: 420px;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 50px;
        }

        .auth-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            color: var(--gold);
            letter-spacing: 4px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            text-align: center;
            color: var(--muted);
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 14px 16px;
            font-family: 'Jost', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            border-color: var(--gold);
        }

        .btn-submit {
            width: 100%;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 16px;
            font-family: 'Jost', sans-serif;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--gold);
            color: var(--bg);
        }

        .auth-link {
            text-align: center;
            margin-top: 24px;
            color: var(--muted);
            font-size: 12px;
            letter-spacing: 1px;
        }

        .auth-link a {
            color: var(--gold);
            text-decoration: none;
        }

        .error-msg {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #ef4444;
            padding: 12px 16px;
            font-size: 13px;
            margin-bottom: 24px;
            text-align: center;
        }

        .success-msg {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--gold);
            padding: 12px 16px;
            font-size: 13px;
            margin-bottom: 24px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-box">
        <div class="auth-logo">LuxStay</div>
        <div class="auth-subtitle">Добредојдовте назад</div>

        <!-- Error -->
        <div th:if="${param.error}" class="error-msg">
            Погрешно корисничко име или лозинка
        </div>

        <!-- Success after register -->
        <div th:if="${param.registered}" class="success-msg">
            Регистрацијата е успешна! Логирајте се.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label class="form-label">Корисничко име</label>
                <input type="text" name="username"
                       class="form-input"
                       placeholder="Внесете корисничко име"
                       required>
            </div>

            <div class="form-group">
                <label class="form-label">Лозинка</label>
                <input type="password" name="password"
                       class="form-input"
                       placeholder="Внесете лозинка"
                       required>
            </div>

            <button type="submit" class="btn-submit">
                Логирај се
            </button>
        </form>

        <div class="auth-link">
            Немате профил?
            <a href="/register">Регистрирајте се</a>
        </div>
    </div>
</div>

</body>
</html>
