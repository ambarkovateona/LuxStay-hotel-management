<!DOCTYPE html>
<html lang="mk" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>LuxStay — Резервација</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        nav {
            position: sticky;
            top: 0;
            width: 100%;
            z-index: 100;
            padding: 24px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }
        .nav-brand {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            color: var(--gold);
            letter-spacing: 3px;
            text-decoration: none;
            text-transform: uppercase;
        }
        .nav-links { display: flex; align-items: center; gap: 40px; }
        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--gold); }

        .page-header { padding: 60px 60px 40px; text-align: center; }
        .page-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 48px;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .section-line {
            width: 60px;
            height: 1px;
            background: var(--gold);
            margin: 0 auto;
        }

        .reserve-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 60px 100px;
        }

        .room-info-card, .reserve-form-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 40px;
        }

        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            letter-spacing: 3px;
            color: var(--gold);
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .info-label {
            color: var(--muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 11px;
        }

        .amenities { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }
        .amenity-tag {
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 4px 12px;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group { margin-bottom: 24px; }
        .form-label {
            display: block;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            font-family: 'Jost', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-input:focus { border-color: var(--gold); }

        .offer-section { margin-bottom: 24px; }
        .offer-options { display: grid; gap: 8px; margin-bottom: 16px; }

        .offer-option {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 14px 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .offer-option:hover { border-color: var(--gold); }

        /* Disabled услуга */
        .offer-option.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            border-color: var(--border) !important;
        }
        .offer-option.disabled:hover { border-color: var(--border) !important; }

        .included-tag {
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #10b981;
            border: 1px solid #10b981;
            padding: 2px 8px;
            white-space: nowrap;
        }

        .offer-option input[type="radio"],
        .offer-option input[type="checkbox"] {
            accent-color: var(--gold);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .offer-name { font-size: 13px; letter-spacing: 1px; flex: 1; }
        .offer-price {
            color: var(--gold);
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            white-space: nowrap;
        }

        .btn-submit {
            width: 100%;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 16px;
            font-family: 'Jost', sans-serif;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-submit:hover { background: var(--gold); color: var(--bg); }

        .btn-back {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: var(--muted);
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        .btn-back:hover { color: var(--gold); }

        .error-msg {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #ef4444;
            padding: 12px 16px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        footer {
            border-top: 1px solid var(--border);
            text-align: center;
            padding: 40px;
            color: var(--muted);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="nav-brand">LuxStay</a>
    <div class="nav-links">
        <a href="/rooms">Соби</a>
        <div sec:authorize="isAuthenticated()">
            <a href="/dashboard">Мои резервации</a>
        </div>
        <div sec:authorize="!isAuthenticated()">
            <a href="/login" style="border:1px solid var(--gold); color:var(--gold); padding:10px 24px;">
                Логирај се
            </a>
        </div>
        <div sec:authorize="isAuthenticated()">
            <span style="color:var(--muted); font-size:13px;">
                <span sec:authentication="name"></span>
            </span>
            <a href="/logout" style="border:1px solid var(--gold); color:var(--gold); padding:10px 24px; margin-left:20px;">
                Одјави се
            </a>
        </div>
    </div>
</nav>

<div class="page-header">
    <h1 class="page-title">Резервација</h1>
    <div class="section-line"></div>
</div>

<div class="reserve-container">

    <!-- Room Info -->
    <div class="room-info-card">
        <h2 class="card-title" th:text="${room.roomType.typeName}"></h2>
        <div class="info-row">
            <span class="info-label">Соба број</span>
            <span th:text="${room.roomNumber}"></span>
        </div>
        <div class="info-row">
            <span class="info-label">Кат</span>
            <span th:text="${room.floor}"></span>
        </div>
        <div class="info-row">
            <span class="info-label">Капацитет</span>
            <span>До <span th:text="${room.roomType.capacity}"></span> лица</span>
        </div>
        <div class="info-row">
            <span class="info-label">Цена по ноќ</span>
            <span style="color:var(--gold); font-family:'Cormorant Garamond',serif; font-size:20px;">
                <span th:text="${room.roomType.basePrice}"></span> €
            </span>
        </div>
        <div class="amenities">
            <span th:each="amenity : ${room.roomType.amenities}"
                  class="amenity-tag"
                  th:text="${amenity.amenityName}">
            </span>
        </div>
    </div>

    <!-- Form -->
    <div class="reserve-form-card">
        <h2 class="card-title">Детали</h2>

        <div th:if="${error}" class="error-msg" th:text="${error}"></div>

        <form th:action="@{/reservations/create}" method="post"
              th:object="${reservationDto}">

            <input type="hidden" th:field="*{roomId}">

            <div class="form-group">
                <label class="form-label">Check-in датум</label>
                <input type="date" th:field="*{checkInDate}"
                       class="form-input" required
                       th:value="${checkIn}">
            </div>

            <div class="form-group">
                <label class="form-label">Check-out датум</label>
                <input type="date" th:field="*{checkOutDate}"
                       class="form-input" required
                       th:value="${checkOut}">
            </div>

            <div class="form-group">
                <label class="form-label">Број на гости</label>
                <input type="number" th:field="*{numberOfGuests}"
                       class="form-input"
                       min="1"
                       th:max="${room.roomType.capacity}"
                       value="1" required>
            </div>

            <!-- Пакети -->
            <div class="offer-section">
                <label class="form-label">Избери пакет (опционално)</label>
                <div class="offer-options">
                    <label class="offer-option">
                        <input type="radio" name="packageId" value=""
                               id="pkg-none" onchange="handlePackageChange(null)">
                        <span class="offer-name">Без пакет</span>
                        <span class="offer-price">0 €</span>
                    </label>
                    <label th:each="pkg : ${packages}" class="offer-option">
                        <input type="radio" name="packageId"
                               th:value="${pkg.offerId}"
                               th:id="${'pkg-' + pkg.offerId}"
                               th:attr="onchange=|handlePackageChange(${pkg.offerId})|">
                        <div style="flex:1;">
                            <div class="offer-name" th:text="${pkg.offerName}"></div>
                            <div style="font-size:11px; color:var(--muted);"
                                 th:text="${pkg.description}"></div>
                        </div>
                        <span class="offer-price">
                            <span th:text="${pkg.price}"></span> €/ноќ
                        </span>
                    </label>
                </div>


                <!-- Услуги -->
                <label class="form-label">Додатни услуги (опционално)</label>
                <div class="offer-options" id="servicesContainer">
                    <label th:each="svc : ${services}"
                           class="offer-option"
                           th:id="${'svc-label-' + svc.offerId}">
                        <input type="checkbox" name="serviceIds"
                               th:value="${svc.offerId}"
                               th:id="${'svc-' + svc.offerId}">
                        <div style="flex:1;">
                            <div class="offer-name" th:text="${svc.offer.offerName}"></div>
                            <div style="font-size:11px; color:var(--muted);"
                                 th:text="${svc.serviceType}"></div>
                        </div>
                        <span class="offer-price" th:id="${'svc-price-' + svc.offerId}">
            <span th:text="${svc.offer.price}"></span>
            <span th:if="${!svc.offer.fixed}">€/ноќ</span>
            <span th:if="${svc.offer.fixed}">€ еднократно</span>
        </span>
                        <span class="included-tag" th:id="${'svc-included-' + svc.offerId}"
                              style="display:none;">
            Вклучено
        </span>
                    </label>
                </div>
            <button type="submit" class="btn-submit">
                Потврди резервација
            </button>

            <a href="/rooms" class="btn-back">← Назад кон соби</a>

        </form>
    </div>
</div>

<footer>
    <p>© 2024 LuxStay Hotel — Сите права задржани</p>
</footer>

<!-- packageServicesMap од Thymeleaf → JS object -->
<script th:inline="javascript">
    const packageServicesMap = /*[[${packageServicesMap}]]*/ {};

    function handlePackageChange(packageId) {
        // Reset сите услуги
        document.querySelectorAll('#servicesContainer .offer-option').forEach(label => {
            label.classList.remove('disabled');
            const checkbox = label.querySelector('input[type="checkbox"]');
            checkbox.disabled = false;
            checkbox.checked = false;

            // Скриј "Вклучено" тагот
            const serviceId = checkbox.value;
            const includedTag = document.getElementById('svc-included-' + serviceId);
            const priceTag = document.getElementById('svc-price-' + serviceId);
            if (includedTag) includedTag.style.display = 'none';
            if (priceTag) priceTag.style.display = '';
        });

        if (!packageId) return;

        // Земи ги serviceIds за избраниот пакет
        const includedServices = packageServicesMap[packageId] || [];

        includedServices.forEach(serviceId => {
            const label = document.getElementById('svc-label-' + serviceId);
            const checkbox = document.getElementById('svc-' + serviceId);
            const includedTag = document.getElementById('svc-included-' + serviceId);
            const priceTag = document.getElementById('svc-price-' + serviceId);

            if (label && checkbox) {
                label.classList.add('disabled');
                checkbox.disabled = true;
                checkbox.checked = false;
            }
            if (includedTag) includedTag.style.display = 'block';
            if (priceTag) priceTag.style.display = 'none';
        });
    }
</script>

</body>
</html>
