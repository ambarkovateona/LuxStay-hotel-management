<!DOCTYPE html>
<html lang="mk" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxStay Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white min-h-screen">

<!-- Navbar -->
<nav class="bg-gray-800 border-b border-gray-700 px-8 py-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <a href="/" class="text-2xl font-bold text-purple-400">
            <i class="fas fa-hotel"></i> LuxStay
        </a>
        <div class="flex items-center gap-6">
            <a href="/" class="text-gray-300 hover:text-white transition">
                <i class="fas fa-home"></i> Почетна
            </a>
            <a href="/rooms" class="text-gray-300 hover:text-white transition">
                <i class="fas fa-bed"></i> Соби
            </a>

            <!-- Само за логирани -->
            <div sec:authorize="isAuthenticated()">
                <a href="/dashboard" class="text-gray-300 hover:text-white transition">
                    <i class="fas fa-user"></i> Мои резервации
                </a>
            </div>

            <!-- Само за Admin -->
            <div sec:authorize="hasRole('ADMIN')">
                <a href="/admin" class="text-gray-300 hover:text-white transition">
                    <i class="fas fa-cog"></i> Admin
                </a>
            </div>

            <!-- Ако не е логиран -->
            <div sec:authorize="!isAuthenticated()">
                <a href="/login"
                   class="bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-lg transition">
                    <i class="fas fa-sign-in-alt"></i> Логирај се
                </a>
            </div>

            <!-- Ако е логиран -->
            <div sec:authorize="isAuthenticated()">
                <span class="text-gray-400 mr-2">
                    <i class="fas fa-user-circle"></i>
                    <span sec:authentication="name"></span>
                </span>
                <a href="/logout"
                   class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg transition">
                    <i class="fas fa-sign-out-alt"></i> Одјави се
                </a>
            </div>
        </div>
    </div>
</nav>

<!-- Content -->
<div class="max-w-7xl mx-auto px-8 py-10">
    <div th:replace="${content}"></div>
</div>

<!-- Footer -->
<footer class="bg-gray-800 border-t border-gray-700 text-center py-6 mt-10">
    <p class="text-gray-400">© 2024 LuxStay Hotel. Сите права задржани.</p>
</footer>

</body>
</html>
